name: Build APK

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        run: |
          curl -sSL https://services.gradle.org/distributions/gradle-8.0-bin.zip -o "$RUNNER_TEMP/gradle-8.0-bin.zip"
          unzip -q "$RUNNER_TEMP/gradle-8.0-bin.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/gradle-8.0/bin" >> "$GITHUB_PATH"

      - name: Build debug APK
        run: gradle --no-daemon assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fibbot-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
